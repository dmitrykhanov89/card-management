spring:
  application:
    name: card-management

  datasource:
    url: jdbc:postgresql://localhost:5432/card_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:/db/migration/db.changelog-master.yaml

springdoc:
  api-docs:
    path: /v3/api-docs
    yaml:
      enabled: true
  swagger-ui:
    path: /swagger-ui.html